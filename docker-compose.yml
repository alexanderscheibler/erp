services:
  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_USER=odoo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - odoo-db:/var/lib/postgresql/data

  odoo:
    image: odoo:19
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069"
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    command: >
      odoo
      --db_host=db
      --db_user=odoo
      --db_password=odoo
      -d odoo_db
      -i stock,point_of_sale,sale_management
      --without-demo=False
      --db-filter=odoo_db
    volumes:
      - odoo-web:/var/lib/odoo
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8069/web/login | grep -q 'Odoo' && exit 0 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

volumes:
  odoo-db:
  odoo-web:
