services:
  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_USER=odoo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - odoo-db:/var/lib/postgresql/data

  # Fake SMTP sink: Odoo delivers all outgoing mail here (see start-odoo.sh,
  # which points an ir.mail_server at mailhog:1025). Nothing is actually sent;
  # captured messages are queryable over the HTTP API on :8025, which the POS
  # email-receipt test asserts against.
  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025" # SMTP (Odoo → MailHog)
      - "8025:8025" # HTTP API + web UI (tests + humans)
    # No healthcheck: the slim MailHog image ships without curl/wget/nc, and
    # Odoo only needs the container started (service_started) for the hostname
    # to resolve — MailHog is ready to accept SMTP almost immediately.

  odoo:
    build: .
    depends_on:
      db:
        condition: service_healthy
      mailhog:
        condition: service_started
    ports:
      - "8069:8069"
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    volumes:
      - odoo-web:/var/lib/odoo
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:8069/web/login | grep -q 'Odoo' && exit 0 || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 300s

  api:
    image: postgrest/postgrest:v14.13
    ports:
      - "3000:3000"
    environment:
      PGRST_DB_URI: postgres://odoo:odoo@db:5432/odoo_db
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: odoo
    depends_on:
      odoo:
        condition: service_healthy

volumes:
  odoo-db:
  odoo-web:
